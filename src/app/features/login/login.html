<div class="login-container">
  <div class="login-card">
    <h1>Login</h1>
    <p>Sign in to access the system</p>

    <form (submit)="onSubmit(); $event.preventDefault()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="user@example.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter your password"
          required
        >
      </div>

      <button
        type="submit"
        class="login-btn"
        [disabled]="authResource.isLoading() || !email || !password"
      >
        @if (authResource.isLoading()) {
          Authenticating...
        } @else {
          Sign In
        }
      </button>
    </form>

    @if (authResource.error()) {
      <div class="error-msg">
        <p>Authentication failed. Please check your credentials.</p>
      </div>
    }

    @if (authResource.value()) {
      <div class="success" style="color: green; margin-top: 1rem;">
        <p>Success! Redirecting...</p>
      </div>
    }

    <div class="example-data">
      <p><strong>Example Data (populated by backend):</strong></p>
      <p>User: user@example.com / password</p>
      <p>Admin: admin@example.com / password</p>
    </div>
  </div>
</div>
